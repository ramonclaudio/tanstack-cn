name: Bug report
description: Something is broken or behaving unexpectedly.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or a repo link that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Bun version
      placeholder: bun -v
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 26.4.1 arm64
