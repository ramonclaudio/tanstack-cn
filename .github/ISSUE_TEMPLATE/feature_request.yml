name: Feature request
description: Suggest a change or addition.
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or friction are you hitting?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to see?
    validations:
      required: true
