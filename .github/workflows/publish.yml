name: Publish to npm

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Determine dist-tag
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-alpha* || "$VERSION" == *-beta* || "$VERSION" == *-rc* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package versions match tag
        run: |
          for pkg in packages/tanstack-cn packages/create-tanstack-cn; do
            pkg_version=$(node -p "require('./$pkg/package.json').version")
            if [ "$pkg_version" != "${{ steps.tag.outputs.version }}" ]; then
              echo "::error::$pkg version ($pkg_version) does not match tag (${{ steps.tag.outputs.version }})"
              exit 1
            fi
          done

      - name: Publish tanstack-cn
        working-directory: packages/tanstack-cn
        run: npm publish --provenance --access public --tag ${{ steps.tag.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-tanstack-cn
        working-directory: packages/create-tanstack-cn
        run: npm publish --provenance --access public --tag ${{ steps.tag.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
